<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #c9d1d9;
          display: flex;
          flex-direction: column;
          justify-content: center;
          height: 120px;
          background: transparent;
        }
        .line {
          font-size: 18px;
          letter-spacing: 0.05em;
          white-space: nowrap;
          overflow: hidden;
          border-right: 3px solid #58a6ff;
          width: 0;
          animation: typing 2.5s steps(40, end) forwards, blink 0.8s step-end infinite;
        }
        .status-container {
          display: flex;
          align-items: center;
          margin-top: 10px;
          font-size: 12px;
          color: #8b949e;
          text-transform: uppercase;
          letter-spacing: 0.2em;
          opacity: 0;
          animation: fadeIn 1s ease forwards;
          animation-delay: 2.7s;
        }
        .pulse {
          width: 8px;
          height: 8px;
          background-color: #3fb950;
          border-radius: 50%;
          margin-right: 10px;
          box-shadow: 0 0 0 rgba(63, 185, 80, 0.4);
          animation: pulse 2s infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 180px } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #58a6ff } }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        @keyframes pulse {
          0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); }
          70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(63, 185, 80, 0); }
          100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
        }

        @media (prefers-color-scheme: light) {
          .container { color: #24292f; }
          .line { border-right-color: #0969da; }
          .status-container { color: #57606a; }
        }
      </style>
      <div class="container">
        <div class="line">> LESS_IS_MORE_</div>
        <div class="status-container">
          <div class="pulse"></div>
          SYSTEM STATUS: THE_ARCHITECTURE_OF_WISDOM
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
