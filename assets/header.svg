<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #ffffff;
          display: flex;
          flex-direction: column;
          justify-content: center;
          height: 120px;
          background: transparent;
          position: relative;
          overflow: hidden;
          padding-left: 20px;
        }
        .grid {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image: linear-gradient(rgba(88, 166, 255, 0.08) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(88, 166, 255, 0.08) 1px, transparent 1px);
          background-size: 20px 20px;
          z-index: -1;
        }
        .main-line {
          font-size: 24px;
          font-weight: 800;
          letter-spacing: 0.15em;
          white-space: nowrap;
          overflow: hidden;
          border-right: 4px solid transparent;
          width: 0;
          animation: typing-main 2s steps(13, end) forwards, blink-main 2s step-end 0s 1;
          color: #ffffff;
        }
        .sub-line {
          font-size: 13px;
          font-weight: 700;
          color: #c9d1d9;
          text-transform: uppercase;
          letter-spacing: 0.4em;
          margin-top: 10px;
          white-space: nowrap;
          opacity: 0;
          filter: blur(8px);
          animation: bloom 15s infinite;
        }
        .sub-line::before {
          content: "";
          animation: content-change 15s infinite;
        }
        .scanline {
          width: 100%;
          height: 2px;
          background: rgba(88, 166, 255, 0.15);
          position: absolute;
          top: 0;
          left: 0;
          animation: scan 4s linear infinite;
          z-index: 1;
        }

        @keyframes typing-main { from { width: 0 } to { width: 260px } }
        @keyframes blink-main { from, to { border-color: #58a6ff } 50% { border-color: transparent } 100% { border-color: transparent } }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        @keyframes bloom {
          0%, 5% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
          10%, 28% { opacity: 1; filter: blur(0px); transform: scale(1); }
          33%, 38% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
          43%, 61% { opacity: 1; filter: blur(0px); transform: scale(1); }
          66%, 71% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
          76%, 95% { opacity: 1; filter: blur(0px); transform: scale(1); }
          100% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
        }

        @keyframes content-change {
          0%, 33% { content: "MAPPING_INFINITE_THOUGHT"; }
          34%, 66% { content: "WHISPERS_OF_SENTIENCE"; }
          67%, 100% { content: "WEAVING_UNIVERSAL_TRUTH"; }
        }

        @media (prefers-color-scheme: light) {
          .container { color: #1f2328; }
          .main-line { color: #1f2328; border-right-color: transparent; }
          .sub-line { color: #444d56; }
          .grid { background-image: linear-gradient(rgba(9, 105, 218, 0.08) 1px, transparent 1px),
                                    linear-gradient(90deg, rgba(9, 105, 218, 0.08) 1px, transparent 1px); }
        }
      </style>
      <div class="container">
        <div class="grid"></div>
        <div class="scanline"></div>
        <div class="main-line">LESS_IS_MORE_</div>
        <div class="sub-line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
