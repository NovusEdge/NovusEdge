<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #ffffff;
          display: flex;
          flex-direction: column;
          justify-content: center;
          height: 120px;
          background: transparent;
          position: relative;
          overflow: hidden;
          padding-left: 20px;
        }
        .grid {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image: linear-gradient(rgba(88, 166, 255, 0.08) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(88, 166, 255, 0.08) 1px, transparent 1px);
          background-size: 20px 20px;
          z-index: -1;
        }
        .main-line {
          font-size: 24px;
          font-weight: 800;
          letter-spacing: 0.15em;
          white-space: nowrap;
          overflow: hidden;
          border-right: 4px solid transparent;
          width: 0;
          animation: typing-main 2s steps(13, end) forwards, blink-main 2s step-end 0s 1;
          color: #ffffff;
        }
        .sub-line {
          font-size: 12px;
          font-weight: 700;
          color: #c9d1d9;
          text-transform: uppercase;
          letter-spacing: 0.3em;
          margin-top: 10px;
          white-space: nowrap;
          overflow: hidden;
          border-right: 3px solid #58a6ff;
          width: 0;
          animation: 
            type-1 3s steps(40, end) 2.2s forwards,
            back-1 1s steps(40, end) 6s forwards,
            type-2 2s steps(21, end) 7.2s forwards,
            back-2 1s steps(21, end) 10s forwards,
            type-3 2.5s steps(47, end) 11.2s forwards,
            blink 0.8s step-end infinite;
        }
        .sub-line::before {
          content: "";
          animation: content-change 14s infinite;
        }
        .scanline {
          width: 100%;
          height: 2px;
          background: rgba(88, 166, 255, 0.15);
          position: absolute;
          top: 0;
          left: 0;
          animation: scan 4s linear infinite;
          z-index: 1;
        }

        @keyframes typing-main { from { width: 0 } to { width: 260px } }
        @keyframes blink-main { from, to { border-color: #58a6ff } 50% { border-color: transparent } 100% { border-color: transparent } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #58a6ff } }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        @keyframes type-1 { from { width: 0; } to { width: 520px; } }
        @keyframes back-1 { from { width: 520px; } to { width: 0; } }
        @keyframes type-2 { from { width: 0; } to { width: 280px; } }
        @keyframes back-2 { from { width: 280px; } to { width: 0; } }
        @keyframes type-3 { from { width: 0; } to { width: 600px; } }

        @keyframes content-change {
          0%, 46% { content: "MAPPING_THE_INFINITE_GEOMETRY_OF_THOUGHT"; }
          47%, 77% { content: "WHISPERS_OF_SENTIENCE"; }
          78%, 100% { content: "WEAVING_THE_TANGIBLE_THREADS_OF_UNIVERSAL_TRUTH"; }
        }

        @media (prefers-color-scheme: light) {
          .container { color: #1f2328; }
          .main-line { color: #1f2328; border-right-color: transparent; }
          .sub-line { color: #444d56; border-right-color: #0969da; }
          .grid { background-image: linear-gradient(rgba(9, 105, 218, 0.08) 1px, transparent 1px),
                                    linear-gradient(90deg, rgba(9, 105, 218, 0.08) 1px, transparent 1px); }
        }
      </style>
      <div class="container">
        <div class="grid"></div>
        <div class="scanline"></div>
        <div class="main-line">LESS_IS_MORE_</div>
        <div class="sub-line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
