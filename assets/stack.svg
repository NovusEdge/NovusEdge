<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .stack-container {
          font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #c9d1d9;
          background: transparent;
          display: flex;
          justify-content: space-between;
          padding: 20px;
        }
        .category {
          width: 23%;
          border-left: 2px solid #30363d;
          padding-left: 15px;
        }
        .category-title {
          font-size: 10px;
          color: #8b949e;
          text-transform: uppercase;
          letter-spacing: 0.2em;
          margin-bottom: 15px;
        }
        .item {
          font-size: 13px;
          margin-bottom: 6px;
          display: flex;
          align-items: center;
        }
        .item-accent {
          color: #58a6ff;
          margin-right: 8px;
          font-weight: bold;
        }

        @media (prefers-color-scheme: light) {
          .stack-container { color: #24292f; }
          .category { border-left-color: #d0d7de; }
          .item-accent { color: #0969da; }
        }
      </style>
      <div class="stack-container">
        <div class="category">
          <div class="category-title">01 / Languages</div>
          <div class="item"><span class="item-accent">::</span> RUST</div>
          <div class="item"><span class="item-accent">::</span> GO</div>
          <div class="item"><span class="item-accent">::</span> C</div>
          <div class="item"><span class="item-accent">::</span> PYTHON</div>
          <div class="item"><span class="item-accent">::</span> ELIXIR</div>
        </div>
        <div class="category">
          <div class="category-title">02 / Data</div>
          <div class="item"><span class="item-accent">::</span> POSTGRES</div>
          <div class="item"><span class="item-accent">::</span> QDRANT</div>
          <div class="item"><span class="item-accent">::</span> CLICKHOUSE</div>
          <div class="item"><span class="item-accent">::</span> TYPEDB</div>
          <div class="item"><span class="item-accent">::</span> REDIS</div>
        </div>
        <div class="category">
          <div class="category-title">03 / Orchestration</div>
          <div class="item"><span class="item-accent">::</span> DAGSTER</div>
          <div class="item"><span class="item-accent">::</span> CLAUDE</div>
        </div>
        <div class="category">
          <div class="category-title">04 / DevOps</div>
          <div class="item"><span class="item-accent">::</span> PULUMI</div>
          <div class="item"><span class="item-accent">::</span> TERRAFORM</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
